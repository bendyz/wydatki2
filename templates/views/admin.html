<!-- Admin Panel View -->
<div id="view-admin" class="view">
  <div class="max-w-3xl mx-auto px-4 py-8">
    <div class="flex items-center mb-6">
      <i class="fas fa-cog text-primary text-2xl mr-3"></i>
      <h1 class="text-2xl font-bold text-gray-900">Panel Administratora</h1>
    </div>

    <!-- Users management -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-800 flex items-center">
          <i class="fas fa-users text-primary mr-2"></i> Użytkownicy
        </h2>
        <button onclick="loadAdminUsers()" class="text-xs text-primary hover:underline"><i class="fas fa-sync mr-1"></i>Odśwież</button>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
              <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
              <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Imię</th>
              <th class="px-3 py-2 text-center text-xs font-medium text-gray-500 uppercase">Admin</th>
              <th class="px-3 py-2 text-center text-xs font-medium text-gray-500 uppercase">Reset hasła</th>
              <th class="px-3 py-2 text-center text-xs font-medium text-gray-500 uppercase">Akcje</th>
            </tr>
          </thead>
          <tbody id="admin-users-list" class="divide-y divide-gray-200 bg-white">
            <tr><td colspan="6" class="px-4 py-4 text-center text-gray-400">Ładowanie...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <form id="admin-config-form" onsubmit="saveAdminConfig(event)" class="space-y-6">

      <!-- Rejestracja -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-user-plus text-primary mr-2"></i> Rejestracja
        </h2>
        <label class="flex items-center space-x-3 cursor-pointer">
          <input type="checkbox" id="cfg-registration-enabled" class="w-5 h-5 rounded text-primary focus:ring-primary" />
          <span class="text-sm font-medium text-gray-700">Włącz rejestrację nowych użytkowników</span>
        </label>
        <p class="mt-2 text-xs text-gray-500">Po wyłączeniu link "Zarejestruj się" zniknie z panelu logowania.</p>
      </div>

      <!-- Ogólne -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-sliders-h text-primary mr-2"></i> Ogólne
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nazwa aplikacji</label>
            <input type="text" id="cfg-app-name" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <label class="flex items-center space-x-3 cursor-pointer">
            <input type="checkbox" id="cfg-debug" class="w-5 h-5 rounded text-primary focus:ring-primary" />
            <span class="text-sm font-medium text-gray-700">Tryb debug</span>
          </label>
        </div>
      </div>

      <!-- Bezpieczeństwo -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-lock text-primary mr-2"></i> Bezpieczeństwo JWT
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Klucz tajny (SECRET_KEY)</label>
            <input type="text" id="cfg-secret-key" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Czas wygaśnięcia tokenu (minuty)</label>
            <input type="number" id="cfg-token-expire" min="5" class="w-40 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
        </div>
      </div>

      <!-- Serwer -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-server text-primary mr-2"></i> Serwer
        </h2>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Host</label>
            <input type="text" id="cfg-server-host" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Port</label>
            <input type="number" id="cfg-server-port" min="1" max="65535" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
        </div>
      </div>

      <!-- AI / OpenRouter -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-robot text-primary mr-2"></i> AI — OpenRouter
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Klucz API</label>
            <input type="password" id="cfg-openrouter-key" autocomplete="new-password"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary" />
            <button type="button" onclick="toggleApiKeyVisibility()"
              class="mt-1 text-xs text-primary hover:underline">Pokaż / ukryj klucz</button>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
            <input type="text" id="cfg-openrouter-model" placeholder="np. google/gemini-3-flash-preview"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Maks. tokenów</label>
              <input type="number" id="cfg-openrouter-max-tokens" min="256" max="32768"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Temperatura (0.0–1.0)</label>
              <input type="number" id="cfg-openrouter-temperature" min="0" max="1" step="0.05"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
          </div>
        </div>
      </div>

      <!-- Personalizacja AI -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-user-circle text-primary mr-2"></i> Personalizacja AI
        </h2>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Kontekst osobisty <span class="text-gray-400 font-normal">(jedna informacja na linię)</span>
        </label>
        <textarea id="cfg-personal-context" rows="6"
          placeholder="Julka to mój samochód osobowy marki Alfa Romeo..."
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-y"></textarea>
      </div>

      <!-- Wykrywanie duplikatów -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
          <i class="fas fa-copy text-primary mr-2"></i> Wykrywanie duplikatów
        </h2>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Zasięg dat (dni)</label>
            <input type="number" id="cfg-dup-days" min="0"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Próg kwoty (zł)</label>
            <input type="number" id="cfg-dup-amount" min="0" step="0.1"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
        </div>
      </div>

      <div class="flex justify-end">
        <button type="submit"
          class="px-6 py-2 bg-primary text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          <i class="fas fa-save mr-2"></i>Zapisz konfigurację
        </button>
      </div>
    </form>
  </div>
</div>
