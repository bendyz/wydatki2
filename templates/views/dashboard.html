<!-- Dashboard View -->
<div id="view-dashboard" class="view max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
    <p class="text-gray-600">Przegląd Twoich wydatków</p>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-5 md:p-6">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-blue-100 text-primary">
          <i class="fas fa-money-bill-wave text-xl"></i>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Ten miesiąc</p>
          <p id="stat-month-total" class="text-xl md:text-2xl font-bold text-gray-900">-</p>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-lg shadow p-5 md:p-6">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-green-100 text-success">
          <i class="fas fa-receipt text-xl"></i>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Liczba wydatków</p>
          <p id="stat-count" class="text-xl md:text-2xl font-bold text-gray-900">-</p>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-lg shadow p-5 md:p-6">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-yellow-100 text-warning">
          <i class="fas fa-sync text-xl"></i>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Aktywne abonamenty</p>
          <p id="stat-subs" class="text-xl md:text-2xl font-bold text-gray-900">-</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-lg shadow mb-6 p-4">
    <div class="flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[140px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Od</label>
        <input type="date" id="filter-start" class="w-full border rounded-md px-3 py-2 text-sm" />
      </div>
      <div class="flex-1 min-w-[140px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Do</label>
        <input type="date" id="filter-end" class="w-full border rounded-md px-3 py-2 text-sm" />
      </div>
      <div class="flex-1 min-w-[160px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Kategoria</label>
        <select id="filter-category" class="w-full border rounded-md px-3 py-2 text-sm">
          <option value="">Wszystkie</option>
        </select>
      </div>
      <button onclick="loadExpenses()" class="bg-primary text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700">
        <i class="fas fa-filter mr-1"></i> Filtruj
      </button>
    </div>
  </div>

  <!-- Expenses Table (Desktop + collapsible mobile cards) -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="hidden md:block overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Opis</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kategoria</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Kwota</th>
            <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Akcje</th>
          </tr>
        </thead>
        <tbody id="expenses-list" class="bg-white divide-y divide-gray-200">
          <tr>
            <td colspan="5" class="px-6 py-4 text-center text-gray-500">Wczytywanie...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Mobile cards will be rendered here -->
    <div id="expenses-list-mobile" class="md:hidden divide-y divide-gray-200"></div>
  </div>
</div>

<!-- Expense Details Modal -->
<div id="expense-modal" class="fixed inset-0 z-40 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeExpenseModal()"></div>
  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
        <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
          <div class="sm:flex sm:items-start">
            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
              <h3 class="text-lg font-semibold leading-6 text-gray-900" id="modal-title">Szczegóły wydatku</h3>
              <div class="mt-4 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-xs font-medium text-gray-500">Kwota</label>
                    <input id="modal-amount" type="number" step="0.01" class="w-full border rounded-md px-3 py-2 text-sm" />
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-gray-500">Data</label>
                    <input id="modal-date" type="date" class="w-full border rounded-md px-3 py-2 text-sm" />
                  </div>
                </div>
                <div>
                  <label class="block text-xs font-medium text-gray-500">Opis / Sklep</label>
                  <input id="modal-description" type="text" class="w-full border rounded-md px-3 py-2 text-sm" />
                </div>
                <div>
                  <label class="block text-xs font-medium text-gray-500">Kategoria</label>
                  <select id="modal-category" class="w-full border rounded-md px-3 py-2 text-sm">
                    <option value="">-- wybierz --</option>
                  </select>
                </div>
                <div>
                  <div class="flex items-center justify-between mb-1">
                    <label class="block text-xs font-medium text-gray-500">Pozycje</label>
                    <span id="modal-items-total" class="text-xs text-gray-500"></span>
                  </div>
                  <div id="modal-items-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
                  <button onclick="addModalItem()" class="mt-2 text-sm text-primary hover:underline">
                    <i class="fas fa-plus mr-1"></i>Dodaj pozycję
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 gap-2">
          <button type="button" onclick="saveExpenseModal()" class="inline-flex w-full justify-center rounded-md bg-success px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-600 sm:w-auto">
            <i class="fas fa-check mr-2"></i>Zapisz
          </button>
          <button type="button" onclick="closeExpenseModal()" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">
            Anuluj
          </button>
          <button type="button" onclick="deleteExpenseModal()" class="mt-3 inline-flex w-full justify-center rounded-md bg-danger px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-600 sm:mt-0 sm:w-auto">
            <i class="fas fa-trash mr-2"></i>Usuń
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
