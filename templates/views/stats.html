<!-- Stats View -->
<div id="view-stats" class="view max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Statystyki</h1>
      <p class="text-gray-600">Analiza wydatków i wykresy</p>
    </div>
    <button onclick="exportCSV()" class="bg-success text-white px-4 py-2 rounded-md hover:bg-green-700 w-full sm:w-auto">
      <i class="fas fa-file-csv mr-2"></i>Eksport CSV
    </button>
  </div>

  <!-- Period Filter -->
  <div class="bg-white rounded-lg shadow mb-6 p-4">
    <div class="flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[140px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Od</label>
        <input type="date" id="stats-start" class="w-full border rounded-md px-3 py-2 text-sm" />
      </div>
      <div class="flex-1 min-w-[140px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Do</label>
        <input type="date" id="stats-end" class="w-full border rounded-md px-3 py-2 text-sm" />
      </div>
      <button onclick="loadStats()" class="bg-primary text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700">
        <i class="fas fa-sync mr-1"></i> Odśwież
      </button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <p class="text-xs md:text-sm font-medium text-gray-600">Suma wydatków</p>
      <p id="stats-total" class="text-lg md:text-2xl font-bold text-gray-900">-</p>
    </div>
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <p class="text-xs md:text-sm font-medium text-gray-600">Liczba transakcji</p>
      <p id="stats-count" class="text-lg md:text-2xl font-bold text-gray-900">-</p>
    </div>
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <p class="text-xs md:text-sm font-medium text-gray-600">Średnio dziennie</p>
      <p id="stats-avg-day" class="text-lg md:text-2xl font-bold text-gray-900">-</p>
    </div>
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <p class="text-xs md:text-sm font-medium text-gray-600">Średnio na wydatek</p>
      <p id="stats-avg-exp" class="text-lg md:text-2xl font-bold text-gray-900">-</p>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <h3 class="text-base md:text-lg font-bold text-gray-900 mb-4">Wydatki per kategoria</h3>
      <div class="relative h-64 md:h-80">
        <canvas id="chart-categories"></canvas>
      </div>
    </div>
    <div class="bg-white rounded-lg shadow p-4 md:p-6">
      <h3 class="text-base md:text-lg font-bold text-gray-900 mb-4">Wydatki w czasie</h3>
      <div class="relative h-64 md:h-80">
        <canvas id="chart-daily"></canvas>
      </div>
    </div>
  </div>

  <!-- Monthly Table -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <h3 class="text-base md:text-lg font-bold text-gray-900 px-4 md:px-6 py-4 border-b">Podsumowanie miesięczne</h3>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Miesiąc</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Kwota</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Liczba</th>
          </tr>
        </thead>
        <tbody id="stats-monthly-list" class="divide-y divide-gray-200"></tbody>
      </table>
    </div>
  </div>
</div>
