<!-- Add Expense View -->
<div id="view-add-expense" class="view max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="mb-5">
    <h1 class="text-2xl font-bold text-gray-900">Dodaj wydatek</h1>
    <p class="text-gray-500 text-sm mt-1">Wybierz sposób dodawania</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200">
    <!-- Tabs -->
    <div class="border-b border-gray-200">
      <nav class="-mb-px flex">
        <button onclick="showExpenseTab('manual')" id="tab-manual"
          class="flex-1 py-3 md:py-4 px-1 text-center border-b-2 border-primary text-primary font-medium text-sm">
          <i class="fas fa-keyboard mr-1 md:mr-2"></i>Ręcznie
        </button>
        <button onclick="showExpenseTab('receipt')" id="tab-receipt"
          class="flex-1 py-3 md:py-4 px-1 text-center border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium text-sm">
          <i class="fas fa-camera mr-1 md:mr-2"></i><span class="hidden sm:inline">Zdjęcie paragonu</span><span class="sm:hidden">Paragon</span>
        </button>
        <button onclick="showExpenseTab('text')" id="tab-text"
          class="flex-1 py-3 md:py-4 px-1 text-center border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium text-sm">
          <i class="fas fa-comment mr-1 md:mr-2"></i><span class="hidden sm:inline">Opis tekstowy</span><span class="sm:hidden">Tekst</span>
        </button>
      </nav>
    </div>

    <!-- Manual Form -->
    <div id="expense-tab-manual" class="p-4 md:p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kwota</label>
          <input type="number" step="0.01" id="manual-amount"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="0.00" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
          <input type="date" id="manual-date"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Opis / Sklep</label>
          <input type="text" id="manual-description"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="np. Biedronka, Netflix..." />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Kategoria</label>
          <select id="manual-category"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            <option value="">-- wybierz --</option>
          </select>
        </div>
        {% if enable_payment_cards %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Karta płatnicza</label>
          <select id="manual-card"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            <option value="">-- brak --</option>
          </select>
        </div>
        {% endif %}
      </div>
      <div class="mt-5">
        <button onclick="addManualExpense()"
          class="w-full sm:w-auto bg-primary text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">
          <i class="fas fa-save mr-2"></i>Zapisz wydatek
        </button>
      </div>
    </div>

    <!-- Receipt Upload -->
    <div id="expense-tab-receipt" class="p-4 md:p-6 hidden">
      <div id="receipt-upload-area"
        class="border-2 border-dashed border-gray-300 rounded-xl p-8 md:p-12 text-center cursor-pointer hover:border-primary hover:bg-blue-50 transition-colors">
        <i class="fas fa-cloud-upload-alt text-3xl md:text-4xl text-gray-400 mb-3"></i>
        <p class="text-base font-medium text-gray-700">Przeciągnij zdjęcie paragonu tutaj</p>
        <p class="text-sm text-gray-500 mt-1">lub kliknij, aby wybrać plik</p>
        <input type="file" id="receipt-file-input" accept="image/*" class="hidden" />
      </div>
      <div id="receipt-preview" class="hidden mt-4">
        <img id="receipt-preview-img" class="max-h-48 md:max-h-64 mx-auto rounded-lg shadow" />
        <div class="mt-4 flex justify-center">
          <button onclick="analyzeReceipt()"
            class="bg-success text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-green-700 transition-colors">
            <i class="fas fa-brain mr-2"></i>Analizuj przez AI
          </button>
        </div>
      </div>
      <div id="receipt-loading" class="hidden mt-4 text-center text-gray-500">
        <i class="fas fa-spinner fa-spin text-3xl text-primary"></i>
        <p class="mt-2 text-sm">AI analizuje paragon...</p>
      </div>
    </div>

    <!-- Text Input -->
    <div id="expense-tab-text" class="p-4 md:p-6 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Opisz wydatek</label>
        <textarea id="text-expense-input" rows="4"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none"
          placeholder="np. Wczoraj wydałem 10zł w żabce na batonika i wodę..."></textarea>
        <p class="text-xs text-gray-500 mt-1">AI rozpozna kwotę, datę, sklep i kategorię.</p>
      </div>
      <div class="mt-4">
        <button onclick="analyzeTextExpense()"
          class="w-full sm:w-auto bg-success text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-green-700 transition-colors">
          <i class="fas fa-brain mr-2"></i>Analizuj przez AI
        </button>
      </div>
      <div id="text-loading" class="hidden mt-4 text-center text-gray-500">
        <i class="fas fa-spinner fa-spin text-3xl text-primary"></i>
        <p class="mt-2 text-sm">AI analizuje opis...</p>
      </div>
    </div>
  </div>
</div>
