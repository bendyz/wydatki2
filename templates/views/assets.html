<!-- Majątek View -->
<div id="view-assets" class="view">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center mb-6">
      <i class="fas fa-piggy-bank text-primary text-2xl mr-3"></i>
      <h1 class="text-2xl font-bold text-gray-900">Majątek</h1>
    </div>

    <!-- Password gate -->
    <div id="assets-gate" class="hidden">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 max-w-sm mx-auto text-center">
        <i class="fas fa-lock text-primary text-4xl mb-4"></i>
        <h2 class="text-lg font-semibold text-gray-800 mb-1" id="assets-gate-title">Podaj hasło modułu</h2>
        <p class="text-xs text-gray-500 mb-5" id="assets-gate-desc">Dane są zaszyfrowane. Hasło nie jest nigdzie zapisane.</p>
        <input id="assets-pwd-input" type="password" placeholder="Hasło modułu Majątek"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-primary"
          onkeydown="if(event.key==='Enter') assetsUnlock()" />
        <div id="assets-gate-error" class="hidden text-xs text-danger mb-2">Nieprawidłowe hasło.</div>
        <button onclick="assetsUnlock()" class="w-full px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-blue-700">
          <i class="fas fa-unlock mr-2"></i><span id="assets-gate-btn-label">Odblokuj</span>
        </button>
      </div>
    </div>

    <!-- Main content (shown after unlock) -->
    <div id="assets-content" class="hidden">

      <!-- Summary card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-sm font-medium text-gray-500">Łącznie</h2>
          <button onclick="assetsLock()" class="text-xs text-gray-400 hover:text-gray-600">
            <i class="fas fa-lock mr-1"></i>Zablokuj
          </button>
        </div>
        <p id="assets-total" class="text-3xl font-bold text-gray-900 mb-4">—</p>
        <canvas id="assets-chart" height="110"></canvas>
      </div>

      <!-- Accounts list -->
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-semibold text-gray-800">Konta / kupki pieniędzy</h2>
        <button onclick="openAddAccountModal()"
          class="px-3 py-1.5 bg-primary text-white text-sm font-medium rounded-md hover:bg-blue-700">
          <i class="fas fa-plus mr-1"></i>Dodaj
        </button>
      </div>
      <div id="assets-accounts-list" class="space-y-3 mb-8">
        <p class="text-sm text-gray-400">Ładowanie...</p>
      </div>

    </div>
  </div>
</div>

<!-- Add account modal -->
<div id="add-account-modal" class="fixed inset-0 z-50 hidden" role="dialog">
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeAddAccountModal()"></div>
  <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">
      <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b">
        <h3 class="text-base font-semibold text-gray-900"><i class="fas fa-plus text-primary mr-2"></i>Nowe konto</h3>
        <button onclick="closeAddAccountModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-5 space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Nazwa</label>
          <input id="acc-name" type="text" placeholder="np. PKO, Gotówka, Revolut…"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Typ</label>
          <select id="acc-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            <option value="cash">Gotówka</option>
            <option value="bank" selected>Konto bankowe</option>
            <option value="savings">Oszczędności</option>
            <option value="etf">ETF / akcje</option>
            <option value="crypto">Kryptowaluty</option>
            <option value="foreign">Waluta obca</option>
            <option value="other">Inne</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Waluta</label>
          <input id="acc-currency" type="text" value="PLN" maxlength="10"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
      </div>
      <div class="px-5 pb-5 flex gap-2 justify-end">
        <button onclick="closeAddAccountModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 text-sm hover:bg-gray-50">Anuluj</button>
        <button onclick="saveNewAccount()" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-700">Dodaj</button>
      </div>
    </div>
  </div>
</div>

<!-- Add snapshot modal -->
<div id="add-snapshot-modal" class="fixed inset-0 z-50 hidden" role="dialog">
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeAddSnapshotModal()"></div>
  <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">
      <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b">
        <h3 class="text-base font-semibold text-gray-900" id="snapshot-modal-title"><i class="fas fa-edit text-primary mr-2"></i>Dodaj wpis</h3>
        <button onclick="closeAddSnapshotModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-5 space-y-3">
        <input type="hidden" id="snapshot-account-id" />
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Kwota</label>
          <input id="snapshot-amount" type="number" step="0.01" placeholder="0.00"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Data</label>
          <input id="snapshot-date" type="date"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Notatka (opcjonalna)</label>
          <input id="snapshot-note" type="text" placeholder="np. po wypłacie"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
            onkeydown="if(event.key==='Enter') saveSnapshot()" />
        </div>
      </div>
      <div class="px-5 pb-5 flex gap-2 justify-end">
        <button onclick="closeAddSnapshotModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 text-sm hover:bg-gray-50">Anuluj</button>
        <button onclick="saveSnapshot()" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-700">Zapisz</button>
      </div>
    </div>
  </div>
</div>
