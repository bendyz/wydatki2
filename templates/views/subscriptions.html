<!-- Subscription Edit Modal -->
<div id="sub-modal" class="fixed inset-0 z-40 hidden" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeSubModal()"></div>
  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-0 sm:items-center sm:p-4">
      <div class="relative w-full sm:max-w-lg bg-white rounded-t-2xl sm:rounded-xl shadow-xl">
        <div class="flex items-center justify-between px-4 pt-4 pb-3 border-b">
          <h3 class="text-base font-semibold text-gray-900">Edytuj abonament</h3>
          <button onclick="closeSubModal()" class="text-gray-400 hover:text-gray-600 p-1"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-4 space-y-3">
          <input type="hidden" id="sub-modal-id" />
          <input type="hidden" id="sub-modal-start-date" />
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Nazwa</label>
            <input id="sub-modal-name" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Kwota (zł)</label>
              <input id="sub-modal-amount" type="number" step="0.01" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Typ cyklu</label>
              <select id="sub-modal-mode" onchange="subModalModeChanged()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                <option value="days">Co X dni</option>
                <option value="monthly">X-tego każdego miesiąca</option>
              </select>
            </div>
          </div>
          <div id="sub-modal-days-row">
            <label class="block text-xs font-medium text-gray-500 mb-1">Co ile dni (np. 7, 14, 30)</label>
            <input id="sub-modal-frequency" type="number" min="1" onchange="subModalFrequencyChanged()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div id="sub-modal-monthly-row" class="hidden">
            <label class="block text-xs font-medium text-gray-500 mb-1">Dzień miesiąca (1–31, np. 2 = 2-ego każdego mies.)</label>
            <input id="sub-modal-billing-day" type="number" min="1" max="31" onchange="subModalBillingDayChanged()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Następna płatność <span class="text-gray-400 font-normal">(auto przy zmianie cyklu)</span></label>
              <input id="sub-modal-next" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Koniec umowy <span class="text-gray-400 font-normal">(opcjonalnie)</span></label>
              <input id="sub-modal-end" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Pozostałe raty <span class="text-gray-400 font-normal">(puste = bez limitu)</span></label>
              <input id="sub-modal-installments" type="number" min="1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Kategoria</label>
              <select id="sub-modal-category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                <option value="">Brak</option>
              </select>
            </div>
          </div>
        </div>
        <div class="px-4 py-3 border-t flex flex-col-reverse sm:flex-row gap-2 sm:justify-end">
          <button onclick="deleteSubscription(document.getElementById('sub-modal-id').value)" class="flex items-center justify-center gap-1 py-2 px-4 rounded-lg bg-red-50 text-danger text-sm font-medium hover:bg-red-100">
            <i class="fas fa-trash"></i> Usuń
          </button>
          <button onclick="closeSubModal()" class="py-2 px-4 rounded-lg border border-gray-300 text-gray-700 text-sm font-medium hover:bg-gray-50">Anuluj</button>
          <button onclick="saveSubModal()" class="flex items-center justify-center gap-1 py-2 px-4 rounded-lg bg-success text-white text-sm font-semibold hover:bg-green-600">
            <i class="fas fa-check"></i> Zapisz
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Subscriptions View -->
<div id="view-subscriptions" class="view max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Abonamenty</h1>
      <p class="text-gray-600">Automatyczne wydatki cykliczne</p>
    </div>
    <button onclick="showAddSubscriptionForm()" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-700 w-full sm:w-auto">
      <i class="fas fa-plus mr-2"></i>Nowy abonament
    </button>
  </div>

  <div id="add-subscription-form" class="hidden bg-white rounded-lg shadow p-4 md:p-6 mb-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Nazwa</label>
        <input type="text" id="sub-name" class="border rounded-md px-3 py-2 w-full" placeholder="np. Netflix, Parking, Czynsz" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Kwota (zł)</label>
        <input type="number" step="0.01" id="sub-amount" class="border rounded-md px-3 py-2 w-full" placeholder="np. 49.99" />
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs font-medium text-gray-500 mb-1">Cykl płatności</label>
        <div class="flex gap-4 mb-2">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="radio" name="sub-mode" value="days" checked onchange="subAddModeChanged()" /> Co X dni
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="radio" name="sub-mode" value="monthly" onchange="subAddModeChanged()" /> X-tego każdego miesiąca
          </label>
        </div>
        <div id="sub-add-days-row">
          <input type="number" id="sub-frequency" class="border rounded-md px-3 py-2 w-full" placeholder="Co ile dni (np. 7, 14, 30)" />
        </div>
        <div id="sub-add-monthly-row" class="hidden">
          <input type="number" id="sub-billing-day" min="1" max="31" class="border rounded-md px-3 py-2 w-full" placeholder="Dzień miesiąca (np. 2 = 2-ego każdego mies.)" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Data pierwszej płatności</label>
        <input type="date" id="sub-start" class="border rounded-md px-3 py-2 w-full" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Koniec umowy <span class="text-gray-400 font-normal">(opcjonalnie)</span></label>
        <input type="date" id="sub-end" class="border rounded-md px-3 py-2 w-full" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Liczba rat <span class="text-gray-400 font-normal">(puste = bez limitu)</span></label>
        <input type="number" id="sub-installments" class="border rounded-md px-3 py-2 w-full" placeholder="np. 24" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Kategoria</label>
        <select id="sub-category" class="border rounded-md px-3 py-2 w-full">
          <option value="">Brak</option>
        </select>
      </div>
    </div>
    <div class="mt-4 flex flex-col sm:flex-row gap-2">
      <button onclick="addSubscription()" class="bg-success text-white px-4 py-2 rounded-md hover:bg-green-700 w-full sm:w-auto">Zapisz</button>
      <button onclick="hideAddSubscriptionForm()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 w-full sm:w-auto">Anuluj</button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nazwa</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Kwota</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase hidden sm:table-cell">Cykl</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Następna płatność</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Akcje</th>
          </tr>
        </thead>
        <tbody id="subscriptions-list" class="divide-y divide-gray-200">
          <tr>
            <td colspan="5" class="px-6 py-4 text-center text-gray-500">Wczytywanie...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
