<!-- Login View -->
<div id="view-login" class="view active flex items-center justify-center min-h-screen px-4">
  <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg">
    <div class="text-center">
      <i class="fas fa-wallet text-primary text-5xl mb-4"></i>
      <h2 class="text-3xl font-bold text-gray-900">Wydatki 2.0</h2>
      <p class="mt-2 text-gray-600">Zarządzaj wydatkami z pomocą AI</p>
    </div>
    <div class="mt-8 space-y-6">
      <div id="login-form">
        <div class="rounded-md shadow-sm -space-y-px">
          <input id="login-email" type="email" required
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
            placeholder="Email" />
          <input id="login-password" type="password" required
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
            placeholder="Hasło" />
        </div>
        <button onclick="login()"
          class="mt-4 group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          Zaloguj się
        </button>
        <p class="mt-2 text-center text-sm text-gray-600">
          Nie masz konta?
          <a href="#" onclick="toggleAuthMode()" class="font-medium text-primary hover:text-blue-500">Zarejestruj się</a>
        </p>
      </div>
      <div id="register-form" class="hidden">
        <div class="rounded-md shadow-sm -space-y-px">
          <input id="reg-email" type="email" required
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
            placeholder="Email" />
          <input id="reg-fullname" type="text"
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
            placeholder="Imię i nazwisko (opcjonalne)" />
          <input id="reg-password" type="password" required
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
            placeholder="Hasło (min. 6 znaków)" />
        </div>
        <button onclick="register()"
          class="mt-4 group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          Zarejestruj się
        </button>
        <p class="mt-2 text-center text-sm text-gray-600">
          Masz już konto?
          <a href="#" onclick="toggleAuthMode()" class="font-medium text-primary hover:text-blue-500">Zaloguj się</a>
        </p>
      </div>
    </div>
    <div id="auth-error" class="hidden mt-4 p-3 bg-red-50 text-red-700 rounded-md text-sm"></div>
  </div>
</div>
