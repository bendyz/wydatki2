<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wydatki 2.0 - AI Expense Manager{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        secondary: "#64748b",
                        success: "#22c55e",
                        danger: "#ef4444",
                        warning: "#f59e0b",
                    },
                },
            },
        };
    </script>
    <style>
        .view { display: none !important; }
        .view.active { display: block !important; }
        #view-login.active { display: flex !important; }
        .drag-over {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav id="navbar" class="bg-white shadow-sm border-b hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-wallet text-primary text-2xl mr-3"></i>
                    <span class="font-bold text-xl text-gray-800">Wydatki 2.0</span>
                </div>
                <!-- Desktop menu -->
                <div class="hidden md:flex items-center space-x-4">
                    <button onclick="showView('dashboard')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-chart-pie mr-1"></i> Dashboard
                    </button>
                    <button onclick="showView('add-expense')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-plus mr-1"></i> Dodaj wydatek
                    </button>
                    <button onclick="showView('categories')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-tags mr-1"></i> Kategorie
                    </button>
                    <button onclick="showView('subscriptions')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-sync mr-1"></i> Abonamenty
                    </button>
                    <button onclick="showView('stats')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-chart-bar mr-1"></i> Statystyki
                    </button>
                    <button onclick="showView('tags')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-hashtag mr-1"></i> Tagi
                    </button>
                    {% if enable_payment_cards %}
                    <button onclick="showView('cards')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-credit-card mr-1"></i> Karty
                    </button>
                    {% endif %}
                    <button id="nav-admin-btn" onclick="showView('admin')" class="hidden nav-btn px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-cog mr-1"></i> Admin
                    </button>
                    <button onclick="openChangePasswordModal()" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                        <i class="fas fa-key mr-1"></i> Zmień hasło
                    </button>
                    <button onclick="logout()" class="px-3 py-2 rounded-md text-sm font-medium text-danger hover:bg-red-50">
                        <i class="fas fa-sign-out-alt mr-1"></i> Wyloguj
                    </button>
                </div>
                <!-- Mobile menu button -->
                <div class="flex items-center md:hidden">
                    <button onclick="toggleMobileMenu()" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu panel -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200">
            <div class="pt-2 pb-3 space-y-1 px-4">
                <button onclick="showView('dashboard'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-chart-pie mr-2"></i> Dashboard
                </button>
                <button onclick="showView('add-expense'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-plus mr-2"></i> Dodaj wydatek
                </button>
                <button onclick="showView('categories'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-tags mr-2"></i> Kategorie
                </button>
                <button onclick="showView('subscriptions'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-sync mr-2"></i> Abonamenty
                </button>
                <button onclick="showView('stats'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-chart-bar mr-2"></i> Statystyki
                </button>
                <button onclick="showView('tags'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-hashtag mr-2"></i> Tagi
                </button>
                {% if enable_payment_cards %}
                <button onclick="showView('cards'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-credit-card mr-2"></i> Karty
                </button>
                {% endif %}
                <button id="nav-admin-btn-mobile" onclick="showView('admin'); toggleMobileMenu()" class="hidden block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-cog mr-2"></i> Admin
                </button>
                <button onclick="openChangePasswordModal(); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-primary hover:bg-gray-100">
                    <i class="fas fa-key mr-2"></i> Zmień hasło
                </button>
                <button onclick="logout(); toggleMobileMenu()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-danger hover:bg-red-50">
                    <i class="fas fa-sign-out-alt mr-2"></i> Wyloguj
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-xs w-full px-4"></div>

    <!-- Change Password Modal -->
    <div id="change-password-modal" class="fixed inset-0 z-50 hidden" role="dialog">
      <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeChangePasswordModal()"></div>
      <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">
          <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b">
            <h3 class="text-base font-semibold text-gray-900"><i class="fas fa-key text-primary mr-2"></i>Zmiana hasła</h3>
            <button onclick="closeChangePasswordModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
          </div>
          <div class="p-5 space-y-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Obecne hasło</label>
              <input id="cp-old" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" placeholder="••••••••" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Nowe hasło</label>
              <input id="cp-new" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" placeholder="min. 6 znaków" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Powtórz nowe hasło</label>
              <input id="cp-confirm" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" placeholder="••••••••"
                onkeydown="if(event.key==='Enter') changePassword()" />
            </div>
          </div>
          <div class="px-5 pb-5 flex gap-2 justify-end">
            <button onclick="closeChangePasswordModal()" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 text-sm hover:bg-gray-50">Anuluj</button>
            <button onclick="changePassword()" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-700">Zmień hasło</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Global tag suggestions dropdown -->
    <div id="tag-dropdown" class="hidden fixed z-[200] bg-white border border-gray-200 rounded-xl shadow-lg p-3 w-64">
      <p class="text-xs text-gray-400 mb-2"><i class="fas fa-fire mr-1"></i>Najpopularniejsze:</p>
      <div id="tag-dropdown-list" class="flex flex-wrap gap-1.5"></div>
      <p id="tag-dropdown-empty" class="hidden text-xs text-gray-400 italic">Brak tagów</p>
    </div>

    <script src="{{ url_for('static', path='js/app.js') }}?v={{ js_version }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
